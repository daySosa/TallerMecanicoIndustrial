<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <title>Diagnóstico Visual 3D - Vehículo</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f1117;
        }

        #contenedor3d {
            width: 100vw;
            height: 100vh;
        }

        #cargando {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #505880;
            font-family: sans-serif;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="contenedor3d"></div>
    <div id="cargando">Cargando modelo...</div>

    <script type="importmap">
        {
          "imports": {
            "three": "./three.module.js",
            "three/addons/": "./addons/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/OrbitControls.js";
        import { RoomEnvironment } from "three/addons/RoomEnvironment.js";
        import { GLTFLoader } from "three/addons/GLTFLoader.js";

        THREE.Cache.enabled = true;

        const contenedor = document.getElementById("contenedor3d");
        const elCargando = document.getElementById("cargando");

        // ── Render / escena / cámara ──────────────────────────────
        // powerPreference: "high-performance" le pide al navegador/GPU priorizar
        // rendimiento sobre ahorro de energía; relevante porque este visor corre
        // embebido dentro de WebView2, compitiendo por GPU con el resto de la app.
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(contenedor.clientWidth, contenedor.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        renderer.domElement.style.touchAction = "none"; // evita gestos del sistema al arrastrar en pantallas táctiles
        contenedor.appendChild(renderer.domElement);

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x0f1117);

        const camara = new THREE.PerspectiveCamera(32, contenedor.clientWidth / contenedor.clientHeight, 0.1, 5000);

        const controles = new OrbitControls(camara, renderer.domElement);
        controles.enableDamping = true;
        controles.dampingFactor = 0.08;
        controles.minDistance = 2.2;
        controles.maxDistance = 9;
        controles.minPolarAngle = THREE.MathUtils.degToRad(15);
        controles.maxPolarAngle = THREE.MathUtils.degToRad(88);
        controles.target.set(0, 0.4, 0);

        function posicionCamaraInicial() {
            camara.position.set(2.6, 1.9, 3.8);
            controles.target.set(0, 0.4, 0);
            controles.update();
        }
        posicionCamaraInicial();

        // ── Entorno (reflejos realistas en pintura/metal) ─────────
        const pmrem = new THREE.PMREMGenerator(renderer);
        escena.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;
        // dispose() libera los recursos internos usados para generar el mapa de
        // entorno (render targets temporales); la textura ya generada sigue
        // siendo válida y usable en la escena. Sin esto se queda memoria de GPU
        // reservada innecesariamente durante toda la sesión del visor.
        pmrem.dispose();

        // ── Luces ──────────────────────────────────────────────────
        escena.add(new THREE.HemisphereLight(0x8899cc, 0x11131c, 0.55));

        const luzPrincipal = new THREE.DirectionalLight(0xffffff, 2.4);
        luzPrincipal.position.set(-3, 4, 3);
        luzPrincipal.castShadow = true;
        luzPrincipal.shadow.mapSize.set(1024, 1024);
        luzPrincipal.shadow.camera.left = -3;
        luzPrincipal.shadow.camera.right = 3;
        luzPrincipal.shadow.camera.top = 3;
        luzPrincipal.shadow.camera.bottom = -3;
        luzPrincipal.shadow.camera.far = 12;
        luzPrincipal.shadow.bias = -0.0005;
        escena.add(luzPrincipal);

        const luzRelleno = new THREE.DirectionalLight(0x3a4dbf, 0.6);
        luzRelleno.position.set(3, 1.5, -3);
        escena.add(luzRelleno);

        // ── Piso (recibe sombra de contacto) ─────────────────────
        const piso = new THREE.Mesh(
            new THREE.CircleGeometry(3.2, 48),
            new THREE.MeshStandardMaterial({ color: 0x13161f, roughness: 0.9, metalness: 0 })
        );
        piso.rotation.x = -Math.PI / 2;
        piso.position.y = 0;
        piso.receiveShadow = true;
        escena.add(piso);

        // ── Textura de círculo suave (para los marcadores de zona) ──
        function crearTexturaCirculo() {
            const size = 128;
            const canvas = document.createElement("canvas");
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext("2d");

            const gradiente = ctx.createRadialGradient(
                size / 2, size / 2, 0,
                size / 2, size / 2, size / 2
            );
            gradiente.addColorStop(0, "rgba(255,255,255,1)");
            gradiente.addColorStop(0.72, "rgba(255,255,255,1)");
            gradiente.addColorStop(0.85, "rgba(255,255,255,0.55)");
            gradiente.addColorStop(1, "rgba(255,255,255,0)");

            ctx.fillStyle = gradiente;
            ctx.beginPath();
            ctx.arc(size / 2, size / 2, size / 2, 0, Math.PI * 2);
            ctx.fill();

            const textura = new THREE.CanvasTexture(canvas);
            textura.colorSpace = THREE.SRGBColorSpace;
            return textura;
        }

        const texturaPunto = crearTexturaCirculo();

        const materialPuntoNormal = new THREE.SpriteMaterial({
            map: texturaPunto,
            color: 0xffffff,
            depthTest: false,
            transparent: true,
            sizeAttenuation: true,
        });
        const materialPuntoHover = new THREE.SpriteMaterial({
            map: texturaPunto,
            color: 0xc9d2ff,
            depthTest: false,
            transparent: true,
            sizeAttenuation: true,
        });
        const materialPuntoActivo = new THREE.SpriteMaterial({
            map: texturaPunto,
            color: 0xff5353,
            depthTest: false,
            transparent: true,
            sizeAttenuation: true,
        });

        const TAMAÑO_PUNTO = 0.16;

        let zonasPorNombre = {};
        const zonasSeleccionadas = new Set();

        // ── Rutas de modelos ───────────────────────────────────────
        const rutasModelos = {
            sedan: "./modelos/sedan.glb",
            suv: "./modelos/suv.glb",
            pickup: "./modelos/pickup.glb",
            moto: "./modelos/moto.glb",
            mototaxi: "./modelos/moto.glb",
        };

        // ── Zonas de diagnóstico por tipo ──────────────────────────
        // Cada zona define DESDE DÓNDE y HACIA DÓNDE se dispara un rayo para
        // encontrar la superficie real del modelo (ver ubicarPuntoZona más abajo):
        //   lado: "arriba"     → rayo desde arriba hacia abajo (capó, baúl, techo)
        //         "izquierda"/"derecha" → rayo horizontal desde ese costado
        //         "frente"/"atras"      → rayo horizontal desde ese extremo
        //   fx, fz: posición horizontal como fracción del ancho/largo (-1 a 1, 0 = centro)
        //   fy: altura como fracción de la altura total (0 = piso, 1 = techo)
        // Esto hace que el punto SIEMPRE quede pegado a la carrocería real,
        // sin importar las proporciones exactas de cada modelo .glb.
        const zonasPorTipo = {
            sedan: [
                { nombre: "Motor", lado: "arriba", fx: 0, fz: 0.5 },
                { nombre: "Transmisión", lado: "izquierda", fy: 0.12, fz: 0 },
                { nombre: "Cajuela / Baúl", lado: "arriba", fx: 0, fz: -0.5 },
                { nombre: "Freno Del. Izq.", lado: "izquierda", fy: 0.12, fz: 0.42 },
                { nombre: "Freno Del. Der.", lado: "derecha", fy: 0.12, fz: 0.42 },
                { nombre: "Freno Tras. Izq.", lado: "izquierda", fy: 0.12, fz: -0.42 },
                { nombre: "Freno Tras. Der.", lado: "derecha", fy: 0.12, fz: -0.42 },
                { nombre: "Sistema de Escape", lado: "derecha", fy: 0.08, fz: -0.25 },
            ],
            suv: [
                { nombre: "Motor", lado: "arriba", fx: 0, fz: 0.48 },
                { nombre: "Transmisión", lado: "izquierda", fy: 0.14, fz: 0 },
                { nombre: "Baúl", lado: "arriba", fx: 0, fz: -0.48 },
                { nombre: "Freno Del. Izq.", lado: "izquierda", fy: 0.14, fz: 0.44 },
                { nombre: "Freno Del. Der.", lado: "derecha", fy: 0.14, fz: 0.44 },
                { nombre: "Freno Tras. Izq.", lado: "izquierda", fy: 0.14, fz: -0.44 },
                { nombre: "Freno Tras. Der.", lado: "derecha", fy: 0.14, fz: -0.44 },
            ],
            pickup: [
                { nombre: "Motor", lado: "arriba", fx: 0, fz: 0.45 },
                { nombre: "Caja de Carga", lado: "arriba", fx: 0, fz: -0.3 },
                { nombre: "Freno Del. Izq.", lado: "izquierda", fy: 0.14, fz: 0.4 },
                { nombre: "Freno Del. Der.", lado: "derecha", fy: 0.14, fz: 0.4 },
                { nombre: "Freno Tras. Izq.", lado: "izquierda", fy: 0.14, fz: -0.4 },
                { nombre: "Freno Tras. Der.", lado: "derecha", fy: 0.14, fz: -0.4 },
            ],
            moto: [
                { nombre: "Motor", lado: "izquierda", fy: 0.25, fz: 0 },
                { nombre: "Transmisión / Cadena", lado: "derecha", fy: 0.15, fz: -0.15 },
                { nombre: "Freno Delantero", lado: "frente", fy: 0.3, fx: 0 },
                { nombre: "Freno Trasero", lado: "atras", fy: 0.3, fx: 0 },
                { nombre: "Sistema de Escape", lado: "derecha", fy: 0.15, fz: -0.3 },
            ],
        };
        zonasPorTipo.mototaxi = zonasPorTipo.moto;

        function crearPuntoZona(nombre, x, y, z) {
            const sprite = new THREE.Sprite(materialPuntoNormal);
            sprite.position.set(x, y, z);
            sprite.scale.set(TAMAÑO_PUNTO, TAMAÑO_PUNTO, 1);
            sprite.userData.zona = nombre;
            sprite.renderOrder = 999;
            return sprite;
        }

        // ── Ubicación de zonas por raycasting sobre el modelo real ──
        const rayoColocacion = new THREE.Raycaster();

        function ubicarPuntoZona(contenedor, caja, zona) {
            const centro = caja.getCenter(new THREE.Vector3());
            const tam = caja.getSize(new THREE.Vector3());
            const margen = Math.max(tam.x, tam.y, tam.z) * 0.6; // garantiza que el rayo empiece fuera del modelo

            let origen, direccion;

            switch (zona.lado) {
                case "izquierda":
                    origen = new THREE.Vector3(caja.min.x - margen, caja.min.y + (zona.fy ?? 0.15) * tam.y, centro.z + (zona.fz ?? 0) * tam.z * 0.5);
                    direccion = new THREE.Vector3(1, 0, 0);
                    break;
                case "derecha":
                    origen = new THREE.Vector3(caja.max.x + margen, caja.min.y + (zona.fy ?? 0.15) * tam.y, centro.z + (zona.fz ?? 0) * tam.z * 0.5);
                    direccion = new THREE.Vector3(-1, 0, 0);
                    break;
                case "frente":
                    origen = new THREE.Vector3(centro.x + (zona.fx ?? 0) * tam.x * 0.5, caja.min.y + (zona.fy ?? 0.3) * tam.y, caja.max.z + margen);
                    direccion = new THREE.Vector3(0, 0, -1);
                    break;
                case "atras":
                    origen = new THREE.Vector3(centro.x + (zona.fx ?? 0) * tam.x * 0.5, caja.min.y + (zona.fy ?? 0.3) * tam.y, caja.min.z - margen);
                    direccion = new THREE.Vector3(0, 0, 1);
                    break;
                default: // "arriba"
                    origen = new THREE.Vector3(centro.x + (zona.fx ?? 0) * tam.x * 0.5, caja.max.y + margen, centro.z + (zona.fz ?? 0) * tam.z * 0.5);
                    direccion = new THREE.Vector3(0, -1, 0);
            }

            rayoColocacion.set(origen, direccion);
            const impactos = rayoColocacion.intersectObject(contenedor, true);

            if (impactos.length > 0) {
                const impacto = impactos[0];
                const normal = impacto.face
                    ? impacto.face.normal.clone().transformDirection(impacto.object.matrixWorld)
                    : direccion.clone().negate();
                return impacto.point.clone().add(normal.multiplyScalar(0.02));
            }

            // Respaldo si el rayo no chocó con nada (ej. zona sobre una ventana o hueco):
            // se ubica de forma aproximada para que la zona nunca desaparezca del todo.
            return new THREE.Vector3(
                centro.x + (zona.fx ?? 0) * tam.x * 0.4,
                centro.y + ((zona.fy ?? 0.3) - 0.5) * tam.y * 0.6,
                centro.z + (zona.fz ?? 0) * tam.z * 0.4
            );
        }

        function crearGrupoZonas(tipo, contenedor) {
            contenedor.updateMatrixWorld(true);
            const caja = new THREE.Box3().setFromObject(contenedor);

            const grupo = new THREE.Group();
            const porNombre = {};
            (zonasPorTipo[tipo] || []).forEach((z) => {
                const posicion = ubicarPuntoZona(contenedor, caja, z);
                const punto = crearPuntoZona(z.nombre, posicion.x, posicion.y, posicion.z);
                grupo.add(punto);
                (porNombre[z.nombre] ??= []).push(punto);
            });
            return { grupo, porNombre };
        }

        function reiniciarMaterialesZonas(grupo) {
            if (!grupo) return;
            grupo.children.forEach((sprite) => { sprite.material = materialPuntoNormal; });
        }

        // ── Caché de modelos ya procesados ──────────────────────────
        const modelosCache = {};

        let grupoZonas = null;
        const loader = new GLTFLoader();
        let modeloActual = null;
        let tokenCarga = 0;
        const TAMAÑO_OBJETIVO = 3.4;

        function procesarGltf(gltf) {
            const modelo = gltf.scene;

            const caja3D = new THREE.Box3().setFromObject(modelo);
            const centro = caja3D.getCenter(new THREE.Vector3());
            const tamaño = caja3D.getSize(new THREE.Vector3());
            const ladoMayor = Math.max(tamaño.x, tamaño.y, tamaño.z);
            const escala = ladoMayor > 0 ? TAMAÑO_OBJETIVO / ladoMayor : 1;

            modelo.position.sub(centro);
            const contenedor = new THREE.Group();
            contenedor.add(modelo);
            contenedor.scale.setScalar(escala);

            const cajaFinal = new THREE.Box3().setFromObject(contenedor);
            contenedor.position.y -= cajaFinal.min.y;

            contenedor.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });

            return contenedor;
        }

        function cargarTipo(t, mostrar) {
            if (modelosCache[t]) {
                if (mostrar) mostrarDesdeCache(t);
                return;
            }

            const ruta = rutasModelos[t] || rutasModelos.sedan;
            tokenCarga++;
            const miToken = tokenCarga;

            loader.load(
                ruta,
                (gltf) => {
                    if (mostrar && miToken !== tokenCarga) return;

                    const contenedor = procesarGltf(gltf);
                    const { grupo, porNombre } = crearGrupoZonas(t, contenedor);
                    modelosCache[t] = { contenedor, grupo, porNombre };

                    if (mostrar) mostrarDesdeCache(t);
                },
                (evento) => {
                    // Progreso real de descarga: mejora la sensación de espera aunque
                    // no acelera la carga en sí (eso depende del peso del .glb).
                    if (mostrar && miToken === tokenCarga && evento.total) {
                        const porcentaje = Math.round((evento.loaded / evento.total) * 100);
                        elCargando.textContent = `Cargando modelo... ${porcentaje}%`;
                    }
                },
                (error) => {
                    console.error("Error cargando modelo:", t, error);
                    if (mostrar && miToken === tokenCarga) {
                        elCargando.textContent = "Error al cargar el modelo";
                    }
                }
            );
        }

        function mostrarDesdeCache(t) {
            const entrada = modelosCache[t];
            if (!entrada) return;

            if (modeloActual) escena.remove(modeloActual);
            if (grupoZonas) escena.remove(grupoZonas);

            reiniciarMaterialesZonas(entrada.grupo);
            zonasSeleccionadas.clear();

            modeloActual = entrada.contenedor;
            grupoZonas = entrada.grupo;
            zonasPorNombre = entrada.porNombre;

            escena.add(modeloActual);
            escena.add(grupoZonas);
            elCargando.style.display = "none";
        }

        /** Precarga en segundo plano los demás tipos. Se retrasa un poco más y se
         *  espacia más entre cada uno para no competir por CPU/red con el primer
         *  modelo mientras el usuario ya está interactuando con él. */
        function precargarRestantesEnSegundoPlano(tipoYaMostrado) {
            const pendientes = Object.keys(rutasModelos).filter(
                (t) => t !== tipoYaMostrado && !modelosCache[t]
            );
            let i = 0;
            function siguiente() {
                if (i >= pendientes.length) return;
                const t = pendientes[i++];
                cargarTipo(t, false);
                setTimeout(siguiente, 800);
            }
            setTimeout(siguiente, 1500);
        }

        let yaSePrecargó = false;

        window.setVehicleType = function (tipo) {
            const t = (tipo || "sedan").toLowerCase();

            if (modelosCache[t]) {
                elCargando.style.display = "none";
                mostrarDesdeCache(t);
            } else {
                elCargando.style.display = "flex";
                elCargando.textContent = "Cargando modelo...";
                cargarTipo(t, true);
            }

            if (!yaSePrecargó) {
                yaSePrecargó = true;
                precargarRestantesEnSegundoPlano(t);
            }
        };

        window.clearZones = function () {
            zonasSeleccionadas.forEach((nombre) => {
                (zonasPorNombre[nombre] || []).forEach((m) => (m.material = materialPuntoNormal));
            });
            zonasSeleccionadas.clear();
        };

        function alternarZona(nombre) {
            const activa = !zonasSeleccionadas.has(nombre);
            if (activa) zonasSeleccionadas.add(nombre); else zonasSeleccionadas.delete(nombre);

            (zonasPorNombre[nombre] || []).forEach(
                (m) => (m.material = activa ? materialPuntoActivo : materialPuntoNormal)
            );

            if (window.chrome?.webview) {
                window.chrome.webview.postMessage(JSON.stringify({ tipo: "zona", zona: nombre, activa }));
            }
        }

        // ── Hover ──
        let puntoConHover = null;

        function actualizarHover(clientX, clientY) {
            const rect = renderer.domElement.getBoundingClientRect();
            puntero.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            puntero.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            rayo.setFromCamera(puntero, camara);
            const intersecciones = rayo.intersectObjects(grupoZonas ? grupoZonas.children : [], false);
            const impacto = intersecciones.find((i) => i.object.userData.zona);
            const nuevoPunto = impacto ? impacto.object : null;

            if (puntoConHover && puntoConHover !== nuevoPunto && !zonasSeleccionadas.has(puntoConHover.userData.zona)) {
                puntoConHover.material = materialPuntoNormal;
            }
            if (nuevoPunto && !zonasSeleccionadas.has(nuevoPunto.userData.zona)) {
                nuevoPunto.material = materialPuntoHover;
            }
            puntoConHover = nuevoPunto;
            renderer.domElement.style.cursor = nuevoPunto ? "pointer" : "grab";
        }

        // ── Clic vs arrastre ──
        const rayo = new THREE.Raycaster();
        const puntero = new THREE.Vector2();
        let bajadaX = 0, bajadaY = 0, huboArrastre = false;

        renderer.domElement.addEventListener("pointerdown", (e) => {
            bajadaX = e.clientX; bajadaY = e.clientY; huboArrastre = false;
        });
        renderer.domElement.addEventListener("pointermove", (e) => {
            if (e.buttons === 1 && (Math.abs(e.clientX - bajadaX) > 4 || Math.abs(e.clientY - bajadaY) > 4)) {
                huboArrastre = true;
            }
            actualizarHover(e.clientX, e.clientY);
        });
        renderer.domElement.addEventListener("pointerup", (e) => {
            if (huboArrastre) return;
            const rect = renderer.domElement.getBoundingClientRect();
            puntero.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            puntero.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            rayo.setFromCamera(puntero, camara);
            const intersecciones = rayo.intersectObjects(grupoZonas ? grupoZonas.children : [], false);
            const impacto = intersecciones.find((i) => i.object.userData.zona);
            if (impacto) alternarZona(impacto.object.userData.zona);
        });

        // ── Resize ──
        // Se ignoran mediciones de 0x0 (contenedor aún no visible/layout en curso):
        // asignarlas rompería la cámara (aspect = Infinity/NaN) y el render target.
        new ResizeObserver(() => {
            const w = contenedor.clientWidth, h = contenedor.clientHeight;
            if (w === 0 || h === 0) return;
            camara.aspect = w / h;
            camara.updateProjectionMatrix();
            renderer.setSize(w, h);
        }).observe(contenedor);

        // ── Loop ──
        function animar() {
            requestAnimationFrame(animar);
            controles.update();
            renderer.render(escena, camara);
        }
        animar();

        // ── Limpieza al cerrar/descargar la página ──────────────────
        // Libera recursos de GPU (buffers, shaders) si el WebView2 recarga o
        // navega fuera de esta página; sin esto la GPU puede quedar reteniendo
        // memoria hasta que el proceso completo de WebView2 termine.
        window.addEventListener("beforeunload", () => {
            renderer.dispose();
        });

    </script>
</body>
</html>
