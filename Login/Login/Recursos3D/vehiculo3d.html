<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <style>
        html, body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f1117;
        }

        #contenedor3d {
            width: 100vw;
            height: 100vh;
        }

        #cargando {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #505880;
            font-family: sans-serif;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="contenedor3d"></div>
    <div id="cargando">Cargando modelo...</div>

    <script type="importmap">
        {
          "imports": {
            "three": "./three.module.js",
            "three/addons/": "./addons/"
          }
        }
    </script>

    <script type="module">
        import * as THREE from "three";
        import { OrbitControls } from "three/addons/OrbitControls.js";
        import { RoomEnvironment } from "three/addons/RoomEnvironment.js";
        import { GLTFLoader } from "three/addons/GLTFLoader.js";

        const contenedor = document.getElementById("contenedor3d");
        const elCargando = document.getElementById("cargando");

        // ── Render / escena / cámara ──────────────────────────────
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setSize(contenedor.clientWidth, contenedor.clientHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.05;
        renderer.outputColorSpace = THREE.SRGBColorSpace;
        contenedor.appendChild(renderer.domElement);

        const escena = new THREE.Scene();
        escena.background = new THREE.Color(0x0f1117);

        const camara = new THREE.PerspectiveCamera(32, contenedor.clientWidth / contenedor.clientHeight, 0.1, 5000);

        const controles = new OrbitControls(camara, renderer.domElement);
        controles.enableDamping = true;
        controles.dampingFactor = 0.08;
        controles.minDistance = 2.2;
        controles.maxDistance = 9;
        controles.minPolarAngle = THREE.MathUtils.degToRad(15);
        controles.maxPolarAngle = THREE.MathUtils.degToRad(88);
        controles.target.set(0, 0.4, 0);

        function posicionCamaraInicial() {
            camara.position.set(2.6, 1.9, 3.8);
            controles.target.set(0, 0.4, 0);
            controles.update();
        }
        posicionCamaraInicial();

        // ── Entorno (reflejos realistas en pintura/metal) ─────────
        const pmrem = new THREE.PMREMGenerator(renderer);
        escena.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

        // ── Luces ──────────────────────────────────────────────────
        escena.add(new THREE.HemisphereLight(0x8899cc, 0x11131c, 0.55));

        const luzPrincipal = new THREE.DirectionalLight(0xffffff, 2.4);
        luzPrincipal.position.set(-3, 4, 3);
        luzPrincipal.castShadow = true;
        luzPrincipal.shadow.mapSize.set(2048, 2048);
        luzPrincipal.shadow.camera.left = -3;
        luzPrincipal.shadow.camera.right = 3;
        luzPrincipal.shadow.camera.top = 3;
        luzPrincipal.shadow.camera.bottom = -3;
        luzPrincipal.shadow.camera.far = 12;
        luzPrincipal.shadow.bias = -0.0005;
        escena.add(luzPrincipal);

        const luzRelleno = new THREE.DirectionalLight(0x3a4dbf, 0.6);
        luzRelleno.position.set(3, 1.5, -3);
        escena.add(luzRelleno);

        // ── Piso (recibe sombra de contacto) ─────────────────────
        const piso = new THREE.Mesh(
            new THREE.CircleGeometry(3.2, 48),
            new THREE.MeshStandardMaterial({ color: 0x13161f, roughness: 0.9, metalness: 0 })
        );
        piso.rotation.x = -Math.PI / 2;
        piso.position.y = 0;
        piso.receiveShadow = true;
        escena.add(piso);

        // ── Materiales para zonas de diagnóstico ──────────────────
        const materialZonaNormal = new THREE.MeshBasicMaterial({ color: 0x4f6ef7, transparent: true, opacity: 0.12, depthWrite: false });
        const materialZonaDañada = new THREE.MeshBasicMaterial({ color: 0xff5353, transparent: true, opacity: 0.62, depthWrite: false });

        let zonasPorNombre = {};
        const zonasSeleccionadas = new Set();

        // ── Rutas de modelos ───────────────────────────────────────
        const rutasModelos = {
            sedan: "./modelos/sedan.glb",
            suv: "./modelos/suv.glb",
            pickup: "./modelos/pickup.glb",
            moto: "./modelos/moto.glb",
            mototaxi: "./modelos/moto.glb", // reemplazar cuando tengas un modelo propio
        };

        // ── Zonas de diagnóstico por tipo, en coordenadas RELATIVAS ──
        // (fracción del tamaño total normalizado: x,y,z entre -0.5 y 0.5 aprox, y de 0 a 1 en alto)
        const zonasPorTipo = {
            sedan: [
                { nombre: "Motor", size: [0.42, 0.28, 0.22], pos: [0, 0.30, 0.38] },
                { nombre: "Transmisión", size: [0.35, 0.18, 0.4], pos: [0, 0.12, 0] },
                { nombre: "Cajuela / Baúl", size: [0.42, 0.28, 0.2], pos: [0, 0.30, -0.40] },
                { nombre: "Freno Del. Izq.", size: [0.14, 0.14, 0.14], pos: [-0.42, 0.14, 0.34] },
                { nombre: "Freno Del. Der.", size: [0.14, 0.14, 0.14], pos: [0.42, 0.14, 0.34] },
                { nombre: "Freno Tras. Izq.", size: [0.14, 0.14, 0.14], pos: [-0.42, 0.14, -0.34] },
                { nombre: "Freno Tras. Der.", size: [0.14, 0.14, 0.14], pos: [0.42, 0.14, -0.34] },
                { nombre: "Sistema de Escape", size: [0.5, 0.06, 0.06], pos: [0.2, 0.05, 0] },
            ],
            suv: [
                { nombre: "Motor", size: [0.42, 0.3, 0.24], pos: [0, 0.32, 0.4] },
                { nombre: "Transmisión", size: [0.36, 0.2, 0.42], pos: [0, 0.14, 0] },
                { nombre: "Baúl", size: [0.42, 0.32, 0.22], pos: [0, 0.32, -0.42] },
                { nombre: "Freno Del. Izq.", size: [0.16, 0.16, 0.16], pos: [-0.44, 0.16, 0.36] },
                { nombre: "Freno Del. Der.", size: [0.16, 0.16, 0.16], pos: [0.44, 0.16, 0.36] },
                { nombre: "Freno Tras. Izq.", size: [0.16, 0.16, 0.16], pos: [-0.44, 0.16, -0.36] },
                { nombre: "Freno Tras. Der.", size: [0.16, 0.16, 0.16], pos: [0.44, 0.16, -0.36] },
            ],
            pickup: [
                { nombre: "Motor", size: [0.4, 0.3, 0.22], pos: [0, 0.32, 0.35] },
                { nombre: "Caja de Carga", size: [0.42, 0.3, 0.4], pos: [0, 0.32, -0.25] },
                { nombre: "Freno Del. Izq.", size: [0.16, 0.16, 0.16], pos: [-0.42, 0.16, 0.32] },
                { nombre: "Freno Del. Der.", size: [0.16, 0.16, 0.16], pos: [0.42, 0.16, 0.32] },
                { nombre: "Freno Tras. Izq.", size: [0.16, 0.16, 0.16], pos: [-0.42, 0.16, -0.32] },
                { nombre: "Freno Tras. Der.", size: [0.16, 0.16, 0.16], pos: [0.42, 0.16, -0.32] },
            ],
            moto: [
                { nombre: "Motor", size: [0.3, 0.24, 0.24], pos: [0, 0.24, 0.05] },
                { nombre: "Transmisión / Cadena", size: [0.14, 0.14, 0.5], pos: [0, 0.12, -0.1] },
                { nombre: "Freno Delantero", size: [0.22, 0.22, 0.22], pos: [0, 0.16, 0.4] },
                { nombre: "Freno Trasero", size: [0.22, 0.22, 0.22], pos: [0, 0.16, -0.4] },
                { nombre: "Sistema de Escape", size: [0.5, 0.1, 0.1], pos: [0.15, 0.14, -0.25] },
            ],
        };
        zonasPorTipo.mototaxi = zonasPorTipo.moto;

        function caja(w, h, d, x, y, z) {
            const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), materialZonaNormal.clone());
            m.position.set(x, y, z);
            return m;
        }

        let grupoZonas = null;

        function crearZonasParaTipo(tipo, escalaModelo) {
            grupoZonas = new THREE.Group();
            zonasPorNombre = {};
            (zonasPorTipo[tipo] || []).forEach((z) => {
                const mesh = caja(
                    z.size[0] * escalaModelo, z.size[1] * escalaModelo, z.size[2] * escalaModelo,
                    z.pos[0] * escalaModelo, z.pos[1] * escalaModelo, z.pos[2] * escalaModelo
                );
                mesh.userData.zona = z.nombre;
                grupoZonas.add(mesh);
                (zonasPorNombre[z.nombre] ??= []).push(mesh);
            });
            escena.add(grupoZonas);
        }

        // ── Carga y normalización automática de escala/centro ─────
        const loader = new GLTFLoader();
        let modeloActual = null;
        let tokenCarga = 0; // se incrementa en cada llamada para invalidar cargas viejas en curso
        const TAMAÑO_OBJETIVO = 3.4;

        window.setVehicleType = function (tipo) {
            const t = (tipo || "sedan").toLowerCase();
            const ruta = rutasModelos[t] || rutasModelos.sedan;

            tokenCarga++;
            const miToken = tokenCarga; // "número de ticket" de esta llamada específica

            elCargando.style.display = "flex";
            zonasSeleccionadas.clear();

            if (modeloActual) { escena.remove(modeloActual); modeloActual = null; }
            if (grupoZonas) { escena.remove(grupoZonas); grupoZonas = null; }

            loader.load(
                ruta,
                (gltf) => {
                    // Si mientras esto cargaba ya se pidió otro vehículo distinto, se descarta este resultado
                    if (miToken !== tokenCarga) return;

                    const modelo = gltf.scene;

                    const caja3D = new THREE.Box3().setFromObject(modelo);
                    const centro = caja3D.getCenter(new THREE.Vector3());
                    const tamaño = caja3D.getSize(new THREE.Vector3());
                    const ladoMayor = Math.max(tamaño.x, tamaño.y, tamaño.z);
                    const escala = ladoMayor > 0 ? TAMAÑO_OBJETIVO / ladoMayor : 1;

                    modelo.position.sub(centro);
                    const contenedor = new THREE.Group();
                    contenedor.add(modelo);
                    contenedor.scale.setScalar(escala);

                    const cajaFinal = new THREE.Box3().setFromObject(contenedor);
                    contenedor.position.y -= cajaFinal.min.y;

                    contenedor.traverse((child) => {
                        if (child.isMesh) {
                            child.castShadow = true;
                            child.receiveShadow = true;
                        }
                    });

                    // Por si en el tiempo que tardó esto en procesarse llegó OTRA carga y ya agregó su modelo:
                    if (modeloActual) escena.remove(modeloActual);
                    if (grupoZonas) escena.remove(grupoZonas);

                    modeloActual = contenedor;
                    escena.add(modeloActual);

                    crearZonasParaTipo(t, TAMAÑO_OBJETIVO);

                    elCargando.style.display = "none";
                },
                undefined,
                (error) => {
                    if (miToken !== tokenCarga) return;
                    console.error("Error cargando modelo:", error);
                    elCargando.textContent = "Error al cargar el modelo";
                }
            );
        };

        window.clearZones = function () {
            zonasSeleccionadas.forEach((nombre) => {
                (zonasPorNombre[nombre] || []).forEach((m) => (m.material = materialZonaNormal));
            });
            zonasSeleccionadas.clear();
        };

        function alternarZona(nombre) {
            const activa = !zonasSeleccionadas.has(nombre);
            if (activa) zonasSeleccionadas.add(nombre); else zonasSeleccionadas.delete(nombre);

            (zonasPorNombre[nombre] || []).forEach((m) => (m.material = activa ? materialZonaDañada : materialZonaNormal));

            if (window.chrome?.webview) {
                window.chrome.webview.postMessage(JSON.stringify({ tipo: "zona", zona: nombre, activa }));
            }
        }

        // ── Clic vs arrastre (4px de tolerancia) ──
        const rayo = new THREE.Raycaster();
        const puntero = new THREE.Vector2();
        let bajadaX = 0, bajadaY = 0, huboArrastre = false;

        renderer.domElement.addEventListener("pointerdown", (e) => {
            bajadaX = e.clientX; bajadaY = e.clientY; huboArrastre = false;
        });
        renderer.domElement.addEventListener("pointermove", (e) => {
            if (e.buttons === 1 && (Math.abs(e.clientX - bajadaX) > 4 || Math.abs(e.clientY - bajadaY) > 4)) {
                huboArrastre = true;
            }
        });
        renderer.domElement.addEventListener("pointerup", (e) => {
            if (huboArrastre) return;
            const rect = renderer.domElement.getBoundingClientRect();
            puntero.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            puntero.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            rayo.setFromCamera(puntero, camara);
            const intersecciones = rayo.intersectObjects(grupoZonas ? grupoZonas.children : [], false);
            const impacto = intersecciones.find((i) => i.object.userData.zona);
            if (impacto) alternarZona(impacto.object.userData.zona);
        });

        // ── Resize ──
        new ResizeObserver(() => {
            const w = contenedor.clientWidth, h = contenedor.clientHeight;
            camara.aspect = w / h;
            camara.updateProjectionMatrix();
            renderer.setSize(w, h);
        }).observe(contenedor);

        // ── Loop ──
        function animar() {
            requestAnimationFrame(animar);
            controles.update();
            renderer.render(escena, camara);
        }
        animar();

    </script>
</body>
</html>
